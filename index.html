<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DonutSMP Casino - Coming Soon</title>

<style>
/* 🔥 FIX WHITE BAR */
html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow-x: hidden;
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-size: 3em;
    background: linear-gradient(90deg, gold, orange, red);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* LOGO */
.logo {
    width: 180px;
    margin-top: 20px;
    border-radius: 50%;
    animation: spin 6s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* SLOT */
.slot {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 40px;
}

.reel {
    width: 80px;
    height: 100px;
    border: 3px solid gold;
    border-radius: 10px;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5em;
    box-shadow: 0 0 20px gold;
}

/* COUNTDOWN */
#countdown {
    margin-top: 30px;
    font-size: 2em;
    color: #00ffcc;
}

/* USERS */
#users {
    margin-top: 10px;
    color: #aaa;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    background: #5865F2;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>

<body>

<h1>🎰 DonutSMP Casino 🎰</h1>

<!-- 🔥 LOGO FIX -->
<img class="logo"
src="https://cdn.discordapp.com/attachments/1495395041848332441/1497514690690154506/IMG_2650.png"
onerror="this.src='https://via.placeholder.com/180';">

<p>The casino is coming back... bigger than ever.</p>

<!-- 🎰 SLOT -->
<div class="slot">
    <div class="reel" id="r1">🎰</div>
    <div class="reel" id="r2">💰</div>
    <div class="reel" id="r3">💎</div>
</div>

<div id="countdown"></div>
<div id="users"></div>

<a class="btn" href="https://discord.gg/tW8RyeVMkX" target="_blank">
Join Discord
</a>

<script>
const symbols = ["🎰","💰","💎","🍩","7️⃣"];

/* ✅ FIXED SLOT SYSTEM */
function spin() {
    spinReel("r1", 0);
    spinReel("r2", 300);
    spinReel("r3", 600);
}

function spinReel(id, delay) {
    let el = document.getElementById(id);

    setTimeout(() => {
        let spins = 20;
        let interval = setInterval(() => {
            el.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
            spins--;

            if (spins <= 0) {
                clearInterval(interval);
            }
        }, 80);
    }, delay);
}

/* LOOP */
setInterval(spin, 3000);
spin();

/* COUNTDOWN */
const target = new Date("2026-05-03T12:30:00+02:00");

function update() {
    let now = new Date();
    let diff = target - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "🚀 LIVE!";
        return;
    }

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor(diff / (1000*60*60)%24);
    let m = Math.floor(diff / (1000*60)%60);
    let s = Math.floor(diff / 1000%60);

    document.getElementById("countdown").innerHTML =
        d+"d "+h+"h "+m+"m "+s+"s";
}

setInterval(update,1000);
update();

/* USERS */
let users = 12;
setInterval(()=>{
    users += Math.floor(Math.random()*3 - 1);
    if(users < 5) users = 5;
    document.getElementById("users").innerHTML =
        "👥 "+users+" users waiting";
},2000);
</script>

</body>
</html>
