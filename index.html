<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donut Gamble - Coming Soon</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #1a1a2e, #0f3460);
    color: white;
    text-align: center;
    overflow-x: hidden;
    overflow-y: auto;
}

/* HEADER TITLE */
h1 {
    font-size: 3em;
    background: linear-gradient(90deg, #ffcc00, #ff6600, #ff0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glowMove 3s linear infinite;
}

@keyframes glowMove {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

header {
    padding: 40px;
}

/* LOGO */
.donut-image {
    max-width: 300px;
    margin-top: 20px;
    border-radius: 50%;
    animation: spin 12s linear infinite, pulseGlow 2s infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* SLOT ANIMATION */
.slot {
    font-size: 2em;
    margin-top: 20px;
    animation: slotMove 1s infinite linear;
}

@keyframes slotMove {
    from { transform: translateX(0); }
    to { transform: translateX(-30px); }
}

/* COUNTDOWN */
#countdown {
    font-size: 2em;
    margin-top: 20px;
    color: #00ffcc;
}

/* DISCORD BUTTON */
.discord-btn {
    display: inline-block;
    margin-top: 25px;
    padding: 15px 30px;
    background: #5865F2;
    color: white;
    text-decoration: none;
    font-size: 1.2em;
    border-radius: 8px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px #5865F2; }
    50% { box-shadow: 0 0 25px #5865F2; }
    100% { box-shadow: 0 0 10px #5865F2; }
}

/* INFO BOX */
.info {
    margin-top: 40px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
}

/* SOUND BUTTON */
.sound-btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff6600;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* LAUNCH SCREEN */
#launchScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #ffcc00, #ff6600, #000);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    color: black;
    text-align: center;
}

/* MOBILE */
@media (max-width: 600px) {
    h1 { font-size: 2em; }
    #countdown { font-size: 1.5em; }
}
</style>
</head>

<body>

<!-- LAUNCH SCREEN -->
<div id="launchScreen">
    <h1>🎉 LAUNCHING NOW 🎉</h1>
    <p>Welcome to Donut Gamble</p>
</div>

<header>
<h1>🎰 Donut Gamble 🎰</h1>
<p>The sweetest Minecraft Casino is coming...</p>
</header>

<img class="donut-image"
src="https://cdn.discordapp.com/attachments/1495395041848332441/1497514690690154506/IMG_2650.png?ex=69edccbc&is=69ec7b3c&hm=a519d1158caf1e082d27eee15d816cac4a4fc1a53c40c22347b538b3b49e3a9a&"
onerror="this.src='https://cdn.discordapp.com/attachments/1495395041848332441/1497514690690154506/IMG_2650.png?ex=69edccbc&is=69ec7b3c&hm=a519d1158caf1e082d27eee15d816cac4a4fc1a53c40c22347b538b3b49e3a9a&';">

<div class="slot">🎲 🎰 💎 🎲 💰 🎰 💎</div>

<div id="countdown"></div>

<a class="discord-btn" href="https://discord.gg/tW8RyeVMkX" target="_blank">
Join our Discord 💬
</a>

<br>

<button class="sound-btn" onclick="playSound()">🔊 Start Sound</button>

<div class="info">
<p>🚧 Development Progress: 40%+</p>
<p>🎰 Unique Minecraft Casino Experience</p>
<p>📅 Launch: 15 May 2026 - 15:00</p>
</div>

<audio id="bgSound" loop>
<source src="https://www.fesliyanstudios.com/play-mp3/4386" type="audio/mpeg">
</audio>

<script>
const targetDate = new Date("2026-05-15T15:00:00+02:00");

function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "🎉 LIVE NOW!";
        document.getElementById("launchScreen").style.display = "flex";
        document.getElementById("bgSound").play();
        return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        d + "d " + h + "h " + m + "m " + s + "s";
}

function playSound() {
    document.getElementById("bgSound").play();
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
