<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donut Gamble</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-size: 3em;
    background: linear-gradient(90deg, #ffcc00, #ff6600, #ff0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* LOGO */
.logo {
    width: 200px;
    margin-top: 20px;
    border-radius: 50%;
}

/* SLOT */
.slot-machine {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    gap: 15px;
}

.reel {
    width: 80px;
    height: 100px;
    border: 3px solid gold;
    border-radius: 12px;
    background: black;
    box-shadow: 0 0 20px gold;
    display: flex;
    align-items: center;
    justify-content: center;
}

.reel span {
    font-size: 2.5em;
}

/* COUNTDOWN */
#countdown {
    font-size: 2em;
    margin-top: 25px;
    color: #00ffcc;
}

/* DISCORD */
.discord-btn {
    margin-top: 20px;
    padding: 15px 30px;
    background: #5865F2;
    border-radius: 8px;
    color: white;
    text-decoration: none;
}

/* INFO */
.info {
    margin-top: 40px;
    padding: 20px;
}

/* LAUNCH */
#launch {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, gold, orange, black);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

/* COINS */
.coin {
    position: fixed;
    top: -50px;
    font-size: 24px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<div id="launch">
    <h1>🎉 JACKPOT RELEASE 🎉</h1>
    <p>Donut Gamble is now LIVE!</p>
</div>

<h1>🎰 Donut Gamble 🎰</h1>

<img class="logo"
src="https://cdn.discordapp.com/attachments/1495395041848332441/1497514690690154506/IMG_2650.png"
onerror="this.src='https://via.placeholder.com/200?text=Donut+Gamble';">

<p>The sweetest Minecraft Casino is coming...</p>

<!-- SLOT -->
<div class="slot-machine">
    <div class="reel"><span id="r1">💎</span></div>
    <div class="reel"><span id="r2">🎰</span></div>
    <div class="reel"><span id="r3">💰</span></div>
</div>

<div id="countdown"></div>

<a class="discord-btn" href="https://discord.gg/tW8RyeVMkX" target="_blank">
Join Discord
</a>

<div class="info">
<p>🚧 Development Progress: 40%+</p>
<p>🎰 Unique Minecraft Casino System</p>
<p>💎 Custom Games & Rewards</p>
<p>🔥 Massive Launch Event</p>
<p>📅 Launch: May 15, 2026 - 15:00</p>
</div>

<!-- REAL CASINO SOUND -->
<audio id="spinSound" src="https://www.fesliyanstudios.com/play-mp3/6677"></audio>
<audio id="winSound" src="https://www.fesliyanstudios.com/play-mp3/4386"></audio>

<script>
const symbols = ["💎","🎰","💰","🍩","7️⃣"];

/* SLOT LOOP SYSTEM */
function spinLoop() {
    spinAll();
    setTimeout(spinLoop, 4000);
}

function spinReel(id, delay) {
    let el = document.getElementById(id);
    let speed = 60;
    let total = 2000 + delay;

    let interval = setInterval(() => {
        el.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
    }, speed);

    setTimeout(() => {
        clearInterval(interval);
        el.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];
    }, total);
}

function spinAll() {
    document.getElementById("spinSound").play();
    spinReel("r1", 0);
    spinReel("r2", 400);
    spinReel("r3", 800);
}

spinLoop();

/* COUNTDOWN */
const target = new Date("2026-05-15T15:00:00+02:00");

function update() {
    let now = new Date();
    let diff = target - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "LIVE!";
        document.getElementById("launch").style.display = "flex";
        document.getElementById("winSound").play();
        spawnCoins(80);
        return;
    }

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor(diff / (1000*60*60) % 24);
    let m = Math.floor(diff / (1000*60) % 60);
    let s = Math.floor(diff / 1000 % 60);

    document.getElementById("countdown").innerHTML =
        d+"d "+h+"h "+m+"m "+s+"s";
}

setInterval(update, 1000);
update();

/* COINS */
function spawnCoins(amount) {
    for (let i = 0; i < amount; i++) {
        let coin = document.createElement("div");
        coin.className = "coin";
        coin.innerHTML = "💰";
        coin.style.left = Math.random()*100+"%";
        coin.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(coin);
    }
}
</script>

</body>
</html>
